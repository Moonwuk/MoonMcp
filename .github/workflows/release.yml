name: Release

# Cut a release by pushing a version tag, e.g. `git tag v0.1.0 && git push --tags`.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # PyPI Trusted Publishing (OIDC) — no API token needed

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5

      - name: Install project (with dev extras)
        run: uv pip install --system -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest + coverage gate)
        run: pytest -q --cov=moonmcp --cov-report=term-missing --cov-fail-under=70

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    # Configure a PyPI Trusted Publisher for this repo, then this needs no secrets.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
